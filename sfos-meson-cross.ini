[binaries]
c = 'gcc'
cpp = 'g++'
ar = 'gcc-ar'
strip = 'strip'
pkg-config = 'pkg-config'

[built-in options]
c_args = ['--sysroot=/opt/sfos-sysroot', '-march=armv8-a', '-mtune=cortex-a73.cortex-a53', '-mno-outline-atomics', '-DU_DISABLE_RENAMING=1', '-flto=auto']
cpp_args = ['--sysroot=/opt/sfos-sysroot', '-march=armv8-a', '-mtune=cortex-a73.cortex-a53', '-mno-outline-atomics', '-DU_DISABLE_RENAMING=1', '-flto=auto']
c_link_args = ['--sysroot=/opt/sfos-sysroot', '-L/opt/sfos-sysroot/usr/lib64', '-L/opt/sfos-sysroot/lib64', '-Wl,--allow-shlib-undefined', '-flto=auto', '-fuse-ld=gold']
cpp_link_args = ['--sysroot=/opt/sfos-sysroot', '-L/opt/sfos-sysroot/usr/lib64', '-L/opt/sfos-sysroot/lib64', '-Wl,--allow-shlib-undefined', '-flto=auto', '-fuse-ld=gold']

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'

[properties]
sys_root = '/opt/sfos-sysroot'
pkg_config_libdir = '/opt/sfos-sysroot/usr/lib64/pkgconfig:/opt/wpe-sfos/lib/pkgconfig'
