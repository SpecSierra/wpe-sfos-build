<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlantic performance probe</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: sans-serif;
    }
    body {
      margin: 0;
      background: #111;
      color: #eee;
    }
    #status {
      padding: 16px;
      font-size: 20px;
      font-weight: 700;
    }
    #notes {
      padding: 0 16px 16px;
      font-size: 14px;
      color: #bbb;
    }
    #stage {
      width: 100vw;
      height: 50vh;
      overflow: hidden;
      position: relative;
      background: #000;
    }
    #canvas {
      width: 100%;
      height: 100%;
      display: none;
      background: #000;
    }
    #domStage {
      width: 100%;
      height: 100%;
      display: none;
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at top, #223, #111 70%);
    }
    .tile {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      will-change: transform;
    }
    #output {
      margin: 0;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="status">Preparing Atlantic performance probe...</div>
  <div id="notes">This page auto-runs and POSTs its JSON result back to the perf lab server.</div>
  <div id="stage">
    <canvas id="canvas"></canvas>
    <div id="domStage"></div>
  </div>
  <pre id="output"></pre>

  <script>
    function queryParam(name, fallbackValue) {
      const value = new URLSearchParams(window.location.search).get(name);
      return value === null ? fallbackValue : value;
    }

    function round(value) {
      return Number.isFinite(value) ? Math.round(value * 1000) / 1000 : value;
    }

    function percentile(values, fraction) {
      if (!values.length) {
        return null;
      }
      if (values.length === 1) {
        return values[0];
      }
      const index = (values.length - 1) * fraction;
      const lower = Math.floor(index);
      const upper = Math.ceil(index);
      if (lower === upper) {
        return values[lower];
      }
      return values[lower] + (values[upper] - values[lower]) * (index - lower);
    }

    function navigationTiming() {
      const entry = performance.getEntriesByType("navigation")[0];
      if (!entry) {
        return null;
      }
      return {
        domContentLoadedMs: round(entry.domContentLoadedEventEnd),
        loadEventEndMs: round(entry.loadEventEnd),
        responseStartMs: round(entry.responseStart),
        responseEndMs: round(entry.responseEnd),
        transferSize: entry.transferSize || 0,
        encodedBodySize: entry.encodedBodySize || 0,
        decodedBodySize: entry.decodedBodySize || 0
      };
    }

    function paintEntries() {
      const result = {};
      for (const entry of performance.getEntriesByType("paint")) {
        result[entry.name] = round(entry.startTime);
      }
      return result;
    }

    function detectWebGL() {
      const canvas = document.createElement("canvas");
      const majorContext = canvas.getContext("webgl", { failIfMajorPerformanceCaveat: true });
      const gl = canvas.getContext("webgl2") || canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
      if (!gl) {
        return {
          supported: false,
          webgl2: false,
          majorPerformanceCaveatFree: !!majorContext
        };
      }

      const debug = gl.getExtension("WEBGL_debug_renderer_info");
      return {
        supported: true,
        webgl2: typeof WebGL2RenderingContext !== "undefined" && gl instanceof WebGL2RenderingContext,
        majorPerformanceCaveatFree: !!majorContext,
        vendor: debug ? gl.getParameter(debug.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
        renderer: debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER),
        version: gl.getParameter(gl.VERSION),
        shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION)
      };
    }

    async function detectWebGPU() {
      if (!("gpu" in navigator) || !navigator.gpu) {
        return {
          supported: false,
          secureContext: window.isSecureContext
        };
      }

      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) {
        return {
          supported: false,
          secureContext: window.isSecureContext,
          adapterAvailable: false
        };
      }

      const limits = {};
      for (const key of Object.keys(adapter.limits || {})) {
        limits[key] = adapter.limits[key];
      }

      return {
        supported: true,
        secureContext: window.isSecureContext,
        adapterAvailable: true,
        features: Array.from(adapter.features || []),
        limits
      };
    }

    async function postResult(result) {
      try {
        const response = await fetch("/report", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(result)
        });
        result.reportStatus = response.ok ? "saved" : `http-${response.status}`;
      } catch (error) {
        result.reportStatus = `error: ${error.message}`;
      }
    }

    async function runRafBenchmark(durationMs, drawFrame) {
      return new Promise((resolve) => {
        const deltas = [];
        let frameCount = 0;
        let startTs = null;
        let previousTs = null;
        let slow20 = 0;
        let slow33 = 0;
        let slow50 = 0;

        function step(ts) {
          if (startTs === null) {
            startTs = ts;
            previousTs = ts;
            if (drawFrame) {
              drawFrame(ts, 0);
            }
            requestAnimationFrame(step);
            return;
          }

          const delta = ts - previousTs;
          deltas.push(delta);
          previousTs = ts;
          frameCount += 1;
          if (delta > 20) slow20 += 1;
          if (delta > 33) slow33 += 1;
          if (delta > 50) slow50 += 1;
          if (drawFrame) {
            drawFrame(ts, ts - startTs);
          }

          if ((ts - startTs) < durationMs) {
            requestAnimationFrame(step);
            return;
          }

          const sortedDeltas = deltas.slice().sort((a, b) => a - b);
          const elapsedMs = ts - startTs;
          resolve({
            durationMs: round(elapsedMs),
            frameCount,
            avgFrameMs: round(deltas.reduce((sum, value) => sum + value, 0) / deltas.length),
            p50FrameMs: round(percentile(sortedDeltas, 0.50)),
            p95FrameMs: round(percentile(sortedDeltas, 0.95)),
            maxFrameMs: round(sortedDeltas[sortedDeltas.length - 1]),
            fps: round(frameCount / (elapsedMs / 1000)),
            slowFramesOver20Ms: slow20,
            slowFramesOver33Ms: slow33,
            slowFramesOver50Ms: slow50
          });
        }

        requestAnimationFrame(step);
      });
    }

    function resizeCanvas(canvas) {
      const devicePixelRatio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(canvas.clientWidth * devicePixelRatio));
      canvas.height = Math.max(1, Math.floor(canvas.clientHeight * devicePixelRatio));
      return devicePixelRatio;
    }

    function createDomBenchmark() {
      const stage = document.getElementById("domStage");
      stage.innerHTML = "";
      stage.style.display = "block";
      const tiles = [];
      const tileCount = 180;
      for (let index = 0; index < tileCount; index += 1) {
        const tile = document.createElement("div");
        tile.className = "tile";
        tile.style.background = `hsl(${(index * 17) % 360}deg 80% 55%)`;
        stage.appendChild(tile);
        tiles.push(tile);
      }

      return (ts) => {
        const width = stage.clientWidth;
        const height = stage.clientHeight;
        tiles.forEach((tile, index) => {
          const x = ((index * 53) + ts * 0.12) % (width + 48) - 24;
          const y = ((index * 97) + Math.sin((ts / 700) + index) * 90 + height / 2) % (height + 48) - 24;
          const scale = 0.8 + Math.sin((ts / 400) + index) * 0.3;
          tile.style.transform = `translate(${x}px, ${y}px) scale(${scale}) rotate(${(ts / 25 + index) % 360}deg)`;
        });
      };
    }

    function createCanvas2DBenchmark() {
      const canvas = document.getElementById("canvas");
      const domStage = document.getElementById("domStage");
      domStage.style.display = "none";
      canvas.style.display = "block";
      const context = canvas.getContext("2d");
      const devicePixelRatio = resizeCanvas(canvas);
      const particleCount = 400;
      const particles = Array.from({ length: particleCount }, (_, index) => ({
        seed: index,
        hue: (index * 11) % 360
      }));

      return (ts) => {
        const width = canvas.width;
        const height = canvas.height;
        context.fillStyle = "#05070b";
        context.fillRect(0, 0, width, height);
        particles.forEach((particle, index) => {
          const x = (Math.sin((ts / 450) + index) * 0.4 + 0.5) * width;
          const y = (Math.cos((ts / 700) + index * 0.5) * 0.4 + 0.5) * height;
          const radius = ((Math.sin((ts / 300) + particle.seed) + 1.4) * 3.5) * devicePixelRatio;
          context.fillStyle = `hsla(${particle.hue}, 90%, 60%, 0.7)`;
          context.beginPath();
          context.arc(x, y, radius, 0, Math.PI * 2);
          context.fill();
        });
      };
    }

    function compileShader(gl, type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader) || "Shader compile failed");
      }
      return shader;
    }

    function createWebGLBenchmark() {
      const canvas = document.getElementById("canvas");
      const domStage = document.getElementById("domStage");
      domStage.style.display = "none";
      canvas.style.display = "block";
      resizeCanvas(canvas);

      const gl = canvas.getContext("webgl2") || canvas.getContext("webgl");
      if (!gl) {
        return {
          drawFrame: null,
          benchmarkInfo: { supported: false }
        };
      }

      const vertexShader = compileShader(gl, gl.VERTEX_SHADER, `
        attribute vec2 a_position;
        uniform float u_time;
        varying float v_phase;
        void main() {
          float wobble = sin(u_time + a_position.x * 9.0) * 0.12;
          gl_Position = vec4(a_position.x, a_position.y + wobble, 0.0, 1.0);
          v_phase = a_position.x + a_position.y + u_time;
        }
      `);
      const fragmentShader = compileShader(gl, gl.FRAGMENT_SHADER, `
        precision mediump float;
        varying float v_phase;
        void main() {
          gl_FragColor = vec4(
            0.5 + 0.5 * sin(v_phase * 1.7),
            0.5 + 0.5 * sin(v_phase * 2.3 + 1.0),
            0.5 + 0.5 * sin(v_phase * 2.9 + 2.0),
            1.0
          );
        }
      `);

      const program = gl.createProgram();
      gl.attachShader(program, vertexShader);
      gl.attachShader(program, fragmentShader);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        throw new Error(gl.getProgramInfoLog(program) || "Program link failed");
      }
      gl.useProgram(program);

      const triangleCount = 2400;
      const positions = new Float32Array(triangleCount * 6);
      for (let index = 0; index < triangleCount; index += 1) {
        const base = index * 6;
        const cx = ((index * 0.137) % 2) - 1;
        const cy = (((index * 0.083) % 2) - 1);
        const size = 0.018 + ((index % 7) * 0.002);
        positions[base + 0] = cx;
        positions[base + 1] = cy - size;
        positions[base + 2] = cx - size;
        positions[base + 3] = cy + size;
        positions[base + 4] = cx + size;
        positions[base + 5] = cy + size;
      }

      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

      const positionLocation = gl.getAttribLocation(program, "a_position");
      const timeLocation = gl.getUniformLocation(program, "u_time");
      gl.enableVertexAttribArray(positionLocation);
      gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

      return {
        benchmarkInfo: {
          supported: true,
          renderer: detectWebGL().renderer,
          vendor: detectWebGL().vendor,
          triangleCount
        },
        drawFrame: (ts) => {
          resizeCanvas(canvas);
          gl.viewport(0, 0, canvas.width, canvas.height);
          gl.clearColor(0.02, 0.03, 0.05, 1.0);
          gl.clear(gl.COLOR_BUFFER_BIT);
          gl.uniform1f(timeLocation, ts / 1000);
          gl.drawArrays(gl.TRIANGLES, 0, triangleCount * 3);
        }
      };
    }

    async function runMode(mode, durationMs) {
      if (mode === "probe") {
        return runRafBenchmark(durationMs, null);
      }
      if (mode === "dom") {
        return runRafBenchmark(durationMs, createDomBenchmark());
      }
      if (mode === "canvas2d") {
        return runRafBenchmark(durationMs, createCanvas2DBenchmark());
      }
      if (mode === "webgl") {
        const benchmark = createWebGLBenchmark();
        if (!benchmark.drawFrame) {
          return {
            unsupported: true,
            reason: "webgl-context-unavailable"
          };
        }
        return {
          benchmarkInfo: benchmark.benchmarkInfo,
          metrics: await runRafBenchmark(durationMs, benchmark.drawFrame)
        };
      }
      throw new Error(`Unknown mode: ${mode}`);
    }

    async function main() {
      const mode = queryParam("mode", "probe");
      const runId = queryParam("run", `${mode}-${Date.now()}`);
      const durationMs = Number(queryParam("durationMs", "5000"));
      const status = document.getElementById("status");
      const output = document.getElementById("output");

      status.textContent = `Running Atlantic performance probe (${mode})...`;

      const result = {
        runId,
        mode,
        href: window.location.href,
        secureContext: window.isSecureContext,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        hardwareConcurrency: navigator.hardwareConcurrency || null,
        deviceMemory: navigator.deviceMemory || null,
        screen: {
          width: window.screen.width,
          height: window.screen.height,
          devicePixelRatio: window.devicePixelRatio || 1
        },
        timing: navigationTiming(),
        paints: paintEntries(),
        webgl: detectWebGL(),
        webgpu: await detectWebGPU()
      };

      try {
        let runResult;
        if (mode === "smoke") {
          runResult = {
            smoke: true,
            timestampMs: round(performance.now())
          };
        } else {
          runResult = await runMode(mode, durationMs);
        }
        if (mode === "webgl" && runResult && runResult.metrics) {
          result.benchmark = runResult.metrics;
          result.webglBenchmark = runResult.benchmarkInfo;
        } else {
          result.benchmark = runResult;
        }
      } catch (error) {
        result.benchmarkError = error.message;
      }

      await postResult(result);
      status.textContent = `Completed Atlantic performance probe (${mode})`;
      output.textContent = JSON.stringify(result, null, 2);
    }

    window.addEventListener("load", () => {
      window.setTimeout(() => {
        main().catch((error) => {
          const status = document.getElementById("status");
          const output = document.getElementById("output");
          const failure = {
            runId: queryParam("run", `failed-${Date.now()}`),
            mode: queryParam("mode", "probe"),
            href: window.location.href,
            secureContext: window.isSecureContext,
            error: String(error.message || error),
            stack: String(error.stack || "")
          };
          status.textContent = `Probe failed: ${failure.error}`;
          output.textContent = JSON.stringify(failure, null, 2);
          postResult(failure);
        });
      }, 250);
    });
  </script>
</body>
</html>
