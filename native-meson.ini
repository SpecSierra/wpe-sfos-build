# Native meson file for libwpe/libepoxy/WPEBackend-fdo on aarch64 Ubuntu
# (no sysroot — use host system libs; sysroot only for Qt plugin + browser)
[built-in options]
c_args   = ['-march=armv8-a', '-mno-outline-atomics']
cpp_args = ['-march=armv8-a', '-mno-outline-atomics']
c_link_args   = ['-static-libgcc', '-Wl,--allow-shlib-undefined']
cpp_link_args = ['-static-libstdc++', '-static-libgcc', '-Wl,--allow-shlib-undefined']
