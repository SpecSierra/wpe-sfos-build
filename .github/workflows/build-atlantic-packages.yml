name: Build Atlantic packages

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/build-atlantic-packages.yml
      - build-all.sh
      - build-rpms-native.sh
      - scripts/**
      - patches/**
      - rpm/**
      - versions.env

permissions:
  contents: write

concurrency:
  group: atlantic-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build RPMs
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - atlantic
    timeout-minutes: 360
    env:
      CI_ROOT: /opt/github-runner/builds/${{ github.run_id }}-${{ github.run_attempt }}
      CI_CACHE_ROOT: /opt/github-runner/cache/atlantic-build
      GNUPGHOME: /opt/github-runner/builds/${{ github.run_id }}-${{ github.run_attempt }}/gnupg
      WORK: ${{ github.workspace }}/..
      BUILD_TOOLS: ${{ github.workspace }}
      BROWSER_SRC: ${{ github.workspace }}/../sailfish-browser-wpe
      PUBLIC_SFOS_BASE_VERSION: 5.0.0.62
      LOCAL_SFOS_SOURCE_SYSROOT: /opt/sfos-sysroot
      QT5_PLUGIN_SOURCE_DIR: /release/workspace/wpewebkit-2.52.1
      NPROC: "6"
      CCACHE_DIR: /opt/github-runner/cache/ccache
      CCACHE_MAXSIZE: 40G
      CCACHE_BASEDIR: /opt/github-runner/cache/atlantic-build
      CCACHE_NOHASHDIR: "1"
      RPM_ITERATION: ${{ github.run_number }}.${{ github.run_attempt }}
      WPE_PREFIX: /opt/github-runner/cache/atlantic-build/wpe-sfos-prefix
      SYSROOT: /opt/github-runner/cache/sfos-sysroot-5.1.0.5
      OUT: /opt/github-runner/builds/${{ github.run_id }}-${{ github.run_attempt }}/wpe-sfos-rpms
      STAGING: /opt/github-runner/builds/${{ github.run_id }}-${{ github.run_attempt }}/wpe-sfos-stage
      ARTIFACT_ROOT: ${{ github.workspace }}/artifacts

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Check out browser repo
        run: |
          set -euo pipefail
          browser_src="$(realpath -m "${BROWSER_SRC}")"
          sudo rm -rf "${browser_src}"
          git clone --depth 1 --branch main https://github.com/SpecSierra/atlantic-browser.git "${browser_src}"
          git -C "${browser_src}" checkout -f main
          git -C "${browser_src}" reset --hard origin/main

      - name: Show runner details
        run: |
          set -euo pipefail
          git -C "$(realpath -m "${BROWSER_SRC}")" rev-parse --short HEAD
          id
          uname -a
          df -h /

      - name: Reset isolated build directories
        run: |
          set -euo pipefail
          rm -rf "${ARTIFACT_ROOT}"
          mkdir -p "${ARTIFACT_ROOT}"
          sudo rm -rf "${CI_ROOT}"

      - name: Build Atlantic packages
        run: |
          set -euo pipefail
          sudo --preserve-env=CI_ROOT,CI_CACHE_ROOT,WORK,BUILD_TOOLS,BROWSER_SRC,PUBLIC_SFOS_BASE_VERSION,LOCAL_SFOS_SOURCE_SYSROOT,QT5_PLUGIN_SOURCE_DIR,WPE_PREFIX,SYSROOT,OUT,STAGING,ARTIFACT_ROOT,NPROC,CCACHE_DIR,CCACHE_MAXSIZE,CCACHE_BASEDIR,CCACHE_NOHASHDIR,RPM_ITERATION \
            bash "${GITHUB_WORKSPACE}/scripts/ci-build.sh"

      - name: Configure RPM signing key
        env:
          ATLANTIC_RPM_SIGNING_KEY: ${{ secrets.ATLANTIC_RPM_SIGNING_KEY }}
          ATLANTIC_RPM_SIGNING_KEY_ID: ${{ secrets.ATLANTIC_RPM_SIGNING_KEY_ID }}
          ATLANTIC_RPM_SIGNING_PASSPHRASE: ${{ secrets.ATLANTIC_RPM_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${ATLANTIC_RPM_SIGNING_KEY:-}" ] || [ -z "${ATLANTIC_RPM_SIGNING_KEY_ID:-}" ]; then
            echo "Missing signing secrets. Set ATLANTIC_RPM_SIGNING_KEY and ATLANTIC_RPM_SIGNING_KEY_ID." >&2
            exit 1
          fi
          if ! command -v rpmsign >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rpm gnupg2
          fi
          sudo rm -rf "${GNUPGHOME}"
          sudo mkdir -p "${GNUPGHOME}"
          sudo chmod 700 "${GNUPGHOME}"
          sudo chown "$(id -u)":"$(id -g)" "${GNUPGHOME}"
          printf '%s\n' "${ATLANTIC_RPM_SIGNING_KEY}" | gpg --batch --import
          gpg --batch --list-secret-keys "${ATLANTIC_RPM_SIGNING_KEY_ID}" >/dev/null

      - name: Sign RPM artifacts
        env:
          ATLANTIC_RPM_SIGNING_KEY_ID: ${{ secrets.ATLANTIC_RPM_SIGNING_KEY_ID }}
          ATLANTIC_RPM_SIGNING_PASSPHRASE: ${{ secrets.ATLANTIC_RPM_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          if [ -z "${ATLANTIC_RPM_SIGNING_KEY_ID:-}" ]; then
            echo "Missing ATLANTIC_RPM_SIGNING_KEY_ID secret" >&2
            exit 1
          fi
          cat > "${HOME}/.rpmmacros" << MACROS
          %_signature gpg
          %_gpg_name ${ATLANTIC_RPM_SIGNING_KEY_ID}
          %_gpg_path ${GNUPGHOME}
          %_gpgbin /usr/bin/gpg
          %_gpg_digest_algo sha256
          %__gpg /usr/bin/gpg
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-armor --no-verbose --pinentry-mode loopback --passphrase "${ATLANTIC_RPM_SIGNING_PASSPHRASE}" %{?_gpg_digest_algo:--digest-algo %{_gpg_digest_algo}} --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          MACROS
          cat "${HOME}/.rpmmacros"
          rpms=("${ARTIFACT_ROOT}/rpms/"*.rpm)
          if [ "${#rpms[@]}" -eq 0 ]; then
            echo "No RPMs found under ${ARTIFACT_ROOT}/rpms to sign" >&2
            exit 1
          fi
          for rpm_path in "${rpms[@]}"; do
            echo "Signing: ${rpm_path}"
            rpmsign --addsign "${rpm_path}"
          done

      - name: Build rpm-md repository metadata
        env:
          ATLANTIC_RPM_SIGNING_KEY_ID: ${{ secrets.ATLANTIC_RPM_SIGNING_KEY_ID }}
          ATLANTIC_RPM_SIGNING_PASSPHRASE: ${{ secrets.ATLANTIC_RPM_SIGNING_PASSPHRASE }}
        run: |
          set -euo pipefail
          if ! command -v createrepo_c >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y createrepo-c
          fi
          repo_root="${ARTIFACT_ROOT}/rpm-repo"
          repo_arch_dir="${repo_root}/aarch64"
          rm -rf "${repo_root}"
          mkdir -p "${repo_arch_dir}"
          cp -a "${ARTIFACT_ROOT}/rpms/." "${repo_arch_dir}/"
          createrepo_c --update "${repo_arch_dir}"
          if [ -z "${ATLANTIC_RPM_SIGNING_KEY_ID:-}" ]; then
            echo "Missing ATLANTIC_RPM_SIGNING_KEY_ID for repository signing" >&2
            exit 1
          fi
          gpg_sign_args=(--batch --yes --armor --pinentry-mode loopback)
          if [ -n "${ATLANTIC_RPM_SIGNING_PASSPHRASE:-}" ]; then
            gpg_sign_args+=(--passphrase "${ATLANTIC_RPM_SIGNING_PASSPHRASE}")
          fi
          gpg "${gpg_sign_args[@]}" \
            --detach-sign \
            --output "${repo_arch_dir}/repodata/repomd.xml.asc" \
            "${repo_arch_dir}/repodata/repomd.xml"
          gpg --batch --yes --armor --export "${ATLANTIC_RPM_SIGNING_KEY_ID}" \
            > "${repo_root}/RPM-GPG-KEY-atlantic-ci"
          cat > "${repo_root}/atlantic-ci.repo" <<REPO
          [atlantic-ci]
          name=Atlantic CI (aarch64)
          enabled=1
          autorefresh=1
          baseurl=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/aarch64/
          type=rpm-md
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/RPM-GPG-KEY-atlantic-ci
          REPO
          cat > "${repo_arch_dir}/index.html" <<HTML
          <!doctype html>
          <html><body>
          <h1>Atlantic CI RPM repository (aarch64)</h1>
          <p>This path is consumed by zypper.</p>
          <p>Metadata: <a href="repodata/repomd.xml">repodata/repomd.xml</a></p>
          </body></html>
          HTML
          cat > "${repo_root}/index.html" <<HTML
          <!doctype html>
          <html><body>
          <h1>Atlantic CI RPM repository</h1>
          <p>Run: ${{ github.run_number }}.${{ github.run_attempt }}</p>
          <p>Commit: ${{ github.sha }}</p>
          <p>Use repo URL: <code>https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/aarch64/</code></p>
          </body></html>
          HTML

      - name: Fix artifact ownership
        if: always()
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u)":"$(id -g)" "${ARTIFACT_ROOT}" || true

      - name: Clean signing material
        if: always()
        run: |
          set -euo pipefail
          sudo rm -rf "${GNUPGHOME}" "${HOME}/.rpmmacros" || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlantic-rpms-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish RPM repo to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: artifacts/rpm-repo
          enable_jekyll: false
          force_orphan: true
          commit_message: "ci: publish rpm repo run ${{ github.run_number }}.${{ github.run_attempt }}"
