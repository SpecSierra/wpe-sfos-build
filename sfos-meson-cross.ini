[binaries]
c = 'gcc'
cpp = 'g++'
ar = 'ar'
strip = 'strip'
pkg-config = 'pkg-config'

[built-in options]
c_args = ['--sysroot=/opt/sfos-sysroot', '-DU_DISABLE_RENAMING=1']
cpp_args = ['--sysroot=/opt/sfos-sysroot', '-DU_DISABLE_RENAMING=1']
c_link_args = ['--sysroot=/opt/sfos-sysroot', '-L/opt/sfos-sysroot/usr/lib64', '-L/opt/sfos-sysroot/lib64', '-Wl,--allow-shlib-undefined']
cpp_link_args = ['--sysroot=/opt/sfos-sysroot', '-L/opt/sfos-sysroot/usr/lib64', '-L/opt/sfos-sysroot/lib64', '-Wl,--allow-shlib-undefined']

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'

[properties]
sys_root = '/opt/sfos-sysroot'
pkg_config_libdir = '/opt/sfos-sysroot/usr/lib64/pkgconfig'
